name: Supabase Keep-Alive

on:
  schedule:
    # Monday 09:00 Israel time (UTC+3 = 06:00 UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase to prevent free-tier pause
    runs-on: ubuntu-latest
    steps:
      - name: Ping passports table
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/passports?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Supabase response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status $STATUS — Supabase may be paused or unreachable"
            exit 1
          fi
          echo "Supabase is alive"
